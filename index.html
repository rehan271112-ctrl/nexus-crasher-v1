        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        textarea { height: 120px; resize: none; }
        .btn-main { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--neon), #80002b); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--neon); }

        .active { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-weight: bold; }
        .hidden { display: none !important; }

</head>

        <div id="p-admin" class="page hidden">
            <div class="card">
                <h3>ADMIN PANEL</h3>
                <input type="text" id="nu" placeholder="New User">
                <input type="password" id="np" placeholder="New Pass">
                <select id="nr"><option value="MEMBER">MEMBER</option><option value="OWNER">OWNER</option></select>
                <button class="btn-main" onclick="createUser()">DEPLOY USER</button>
            </div>

        </div>

        <nav class="nav-bottom">
            <div class="nav-item active" onclick="tab('home')">TERMINAL</div>

        </nav>

    <script>
        const BASE_URL = "https://nexuscrasher-default-rtdb.asia-southeast1.firebasedatabase.app/users";
        let clickCount = 0;

        window.addEventListener('load', () => {
            let prog = 0;
            const fill = document.getElementById('p-fill');
            const interval = setInterval(() => {
                prog += 10;
                if (prog >= 100) {
                    clearInterval(interval);
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('login-screen').classList.remove('hidden');
                }
                fill.style.width = prog + '%';
            }, 50);
        });

        // SECRET TRIGGER LOGIC
        document.getElementById('secret-trigger').onclick = function() {
            clickCount++;
            if(clickCount >= 5) {
                document.getElementById('nav-adm').classList.remove('hidden');
                alert("ACCESS GRANTED: ADMIN TAB UNLOCKED!");
                clickCount = 0;
            }
        };

        async function handleLogin() {
            document.getElementById('nexus-bgm').play().catch(() => {});
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            
            // ADMIN UTAMA DISEMBUNYIIN DI SINI (HARDCODED)
            if (u === "hanzX" && p === "rehanganteng") { loginSuccess(u, "HIGH-OWNER"); return; }
            
            const res = await fetch(`${BASE_URL}/${u}.json`);
            const data = await res.json();
            if (data && data.p === p) loginSuccess(u, data.r);
            else document.getElementById('msg').innerText = "WRONG ACCESS!";
        }

        function loginSuccess(u, r) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            renderList();
        }

        async function renderList() {
            const listDiv = document.getElementById('user-list');
            const res = await fetch(`${BASE_URL}.json`);
            const data = await res.json();
            let html = "<h4>USER DATABASE</h4>";
            for (let key in data) {
                // Jangan nampilin admin hanzX di list biar kaga bisa di-intip
                if(key !== "hanzX") {
                    html += `<div style="font-size:0.7rem; color:#00ffcc; border-bottom:1px solid #333; padding:5px;">${key} [${data[key].r}]</div>`;
                }
            }
            listDiv.innerHTML = html;
        }

        async function createUser() {
            const u = document.getElementById('nu').value.trim();
            const p = document.getElementById('np').value.trim();
            const r = document.getElementById('nr').value;
            await fetch(`${BASE_URL}/${u}.json`, { method: 'PUT', body: JSON.stringify({ p, r, exp: 9999999999999 }) });
            alert("USER DEPLOYED!"); renderList();
        }

        function tab(n) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.getElementById('p-' + n).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function sendBug() {
            const t = document.getElementById('target').value;
            const ammo = document.getElementById('custom-virtex').value;
            if(!t || !ammo) return alert("MISSING DATA!");
            const payload = (ammo + "\n").repeat(20);
            window.location.href = `https://api.whatsapp.com/send?phone=${t}&text=${encodeURIComponent(payload)}`;
        }
    </script>
